services:
  db:
    image: postgres:16
    container_name: tasktracker-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-taskdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskuser} -d ${POSTGRES_DB:-taskdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: tasktracker-pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    volumes:
      - pgadmindata:/var/lib/pgadmin

  db-backup:
    image: postgres:16
    container_name: tasktracker-db-backup
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_DB: ${POSTGRES_DB:-taskdb}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_VERIFY_RESTORE: ${BACKUP_VERIFY_RESTORE:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgbackups:/backups
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    command: ["sh", "/usr/local/bin/backup-postgres.sh"]

  api:
    build: ./api
    container_name: tasktracker-api
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-taskuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-taskdb}
      PORT: 3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      SESSION_SECRET: ${SESSION_SECRET:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-st_session}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.simpletracker.ru}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-2592000}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://simpletracker.ru,https://www.simpletracker.ru}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      ALLOW_PASSWORDLESS_LOGIN: ${ALLOW_PASSWORDLESS_LOGIN:-false}
      TASK_EXPORT_DIR: ${TASK_EXPORT_DIR:-/app/exports}
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - taskexports:/app/exports

volumes:
  pgdata:
  pgadmindata:
  pgbackups:
  taskexports:
